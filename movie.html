<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Details — CineVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--card:#16161f;--border:rgba(255,255,255,0.07);--text:#f0f0f5;--muted:#888899;--accent:#e63946;--accent2:#ff6b6b;--gold:#f4c430;--radius:10px;--font-display:'Bebas Neue',sans-serif;--font-body:'Inter',sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6}
  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(10,10,15,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
  .logo{font-family:var(--font-display);font-size:28px;letter-spacing:2px;color:var(--text);text-decoration:none}.logo span{color:var(--accent)}
  .nav-links{display:flex;align-items:center;gap:32px;list-style:none}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}.nav-links a:hover{color:var(--text)}
  .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}.back-btn:hover{color:var(--text)}

  .backdrop{position:relative;height:480px;overflow:hidden}
  #backdrop-img{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.45)}
  .backdrop-overlay{position:absolute;inset:0;background:linear-gradient(to right,#0a0a0f 35%,transparent 65%),linear-gradient(to top,#0a0a0f 0%,transparent 50%)}
  .backdrop-content{position:relative;z-index:1;display:flex;align-items:flex-end;gap:40px;height:100%;padding:0 48px 48px}
  .poster{flex-shrink:0;width:200px;aspect-ratio:2/3;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.12);background:var(--bg3)}
  .poster img{width:100%;height:100%;object-fit:cover;display:block}
  .poster-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  .poster-ph svg{opacity:.3}.poster-ph span{font-family:var(--font-display);font-size:14px;color:var(--muted);text-align:center;padding:0 12px}

  .genres-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .genre-tag{padding:3px 12px;border-radius:999px;font-size:12px;font-weight:500;background:rgba(230,57,70,.15);color:var(--accent2);border:1px solid rgba(230,57,70,.25)}
  h1{font-family:var(--font-display);font-size:72px;letter-spacing:2px;line-height:.95;margin-bottom:16px}
  .meta-row{display:flex;align-items:center;gap:20px;font-size:13px;color:var(--muted);margin-bottom:20px;flex-wrap:wrap}
  .meta-row .rating{color:var(--gold);font-weight:600;font-size:15px}
  .meta-dot{width:3px;height:3px;border-radius:50%;background:var(--muted)}
  .action-row{display:flex;gap:12px;flex-wrap:wrap}
  .btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;text-decoration:none;font-weight:600;font-size:14px;padding:12px 24px;border-radius:var(--radius);border:none;cursor:pointer;transition:background .2s,transform .15s}.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
  .btn-outline{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);color:#fff;text-decoration:none;font-weight:500;font-size:14px;padding:12px 24px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.18);cursor:pointer;transition:background .2s}.btn-outline:hover{background:rgba(255,255,255,.15)}

  .content{max-width:1100px;margin:0 auto;padding:48px}
  .two-col{display:grid;grid-template-columns:1fr 320px;gap:48px}
  .section-label{font-family:var(--font-display);font-size:20px;letter-spacing:1px;margin-bottom:14px}.section-label span{color:var(--accent)}
  p.synopsis{color:rgba(240,240,245,.75);line-height:1.75;font-size:15px}

  .detail-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
  .detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}.detail-row:last-child{border-bottom:none}
  .detail-row .label{color:var(--muted)}.detail-row .value{color:var(--text);font-weight:500;text-align:right;max-width:60%}
  .source-link{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-size:13px;text-decoration:none;font-weight:500;margin-top:16px;transition:opacity .2s}.source-link:hover{opacity:.8}

  .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-top:48px}
  .movie-card{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s,border-color .2s;text-decoration:none;color:inherit;display:block}.movie-card:hover{transform:translateY(-4px);border-color:rgba(230,57,70,.4)}
  .movie-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
  .movie-poster-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,var(--bg3),var(--bg2));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
  .movie-poster-ph svg{opacity:.3}.movie-poster-ph span{font-family:var(--font-display);font-size:13px;letter-spacing:1px;color:var(--muted);text-align:center;padding:0 10px}
  .movie-info{padding:12px 14px 14px}
  .movie-title-text{font-weight:600;font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .movie-sub{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
  .movie-rating{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:600;color:var(--gold)}
  .badge-free{display:inline-block;background:rgba(230,57,70,.15);color:var(--accent2);font-size:10px;font-weight:600;letter-spacing:.5px;padding:2px 7px;border-radius:4px;text-transform:uppercase}

  footer{margin-top:64px;padding:40px 48px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  footer p{color:var(--muted);font-size:13px}
  .footer-links{display:flex;gap:24px;list-style:none}
  .footer-links a{color:var(--muted);font-size:13px;text-decoration:none;transition:color .2s}.footer-links a:hover{color:var(--text)}
  @media(max-width:768px){nav{padding:0 20px}.nav-links{display:none}.backdrop-content{flex-direction:column;padding:20px 20px 32px;gap:20px}.poster{width:120px}h1{font-size:44px}.content{padding:24px 20px}.two-col{grid-template-columns:1fr;gap:32px}footer{padding:32px 20px;flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Cine<span>Vault</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="browse.html">Movies</a></li>
  </ul>
  <button class="nav-search-btn" onclick="CineVaultSearch.open('')" style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:0 14px;height:36px;color:#888899;font-family:inherit;font-size:14px;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Search</button>
  <a href="index.html" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
</nav>

<div class="backdrop">
  <div id="backdrop-img"></div>
  <div class="backdrop-overlay"></div>
  <div class="backdrop-content">
    <div class="poster" id="poster-wrap"></div>
    <div>
      <div class="genres-row" id="genres-row"></div>
      <h1 id="movie-title">—</h1>
      <div class="meta-row" id="meta-row"></div>
      <div class="action-row">
        <a id="watch-btn" href="#" class="btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Watch now
        </a>
        <button class="btn-outline" id="wl-btn" onclick="toggleWatchlist(this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="wl-icon"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span id="wl-text">Add to watchlist</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="content">
  <div class="two-col">
    <div>
      <h2 class="section-label">Synopsis</h2>
      <p class="synopsis" id="synopsis"></p>
      <h2 class="section-label" style="margin-top:40px">Related <span>films</span></h2>
      <div class="related-grid" id="related-grid"></div>
    </div>
    <div>
      <h2 class="section-label">Film <span>details</span></h2>
      <div class="detail-card" id="detail-card"></div>
    </div>
  </div>
</div>

<footer>
  <a href="index.html" class="logo">Cine<span>Vault</span></a>
  <ul class="footer-links"><li><a href="#">About</a></li><li><a href="#">Legal</a></li><li><a href="#">Sources</a></li></ul>
  <p>All films are in the public domain. Free forever.</p>
</footer>

<script src="movies.js"></script>
<script src="search.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const movie = getMovieById(params.get('id')) || getFeaturedMovie();

  document.title = `${movie.title} — CineVault`;
  if (movie.poster) document.getElementById('backdrop-img').style.backgroundImage = `url('${movie.poster}')`;
  document.getElementById('movie-title').textContent = movie.title;
  document.getElementById('watch-btn').href = getWatchUrl(movie);
  document.getElementById('synopsis').textContent = movie.synopsis;

  // Poster
  const posterWrap = document.getElementById('poster-wrap');
  if (movie.poster) {
    posterWrap.innerHTML = `<img src="${movie.poster}" alt="${movie.title}">`;
  } else {
    posterWrap.innerHTML = `<div class="poster-ph"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>${movie.title}</span></div>`;
  }

  // Genres
  movie.genres.forEach(g => {
    const s = document.createElement('span'); s.className = 'genre-tag'; s.textContent = g;
    document.getElementById('genres-row').appendChild(s);
  });

  // Meta
  document.getElementById('meta-row').innerHTML = `
    <span class="rating">★ ${movie.rating} / 10</span>
    <span class="meta-dot"></span><span>${movie.year}</span>
    <span class="meta-dot"></span><span>${renderRuntime(movie.runtime)}</span>
    <span class="meta-dot"></span><span>Directed by ${movie.director}</span>
    <span class="meta-dot"></span><span style="color:#4ade80;font-weight:600">✓ Free to watch</span>`;

  // Detail card
  const archiveId = movie.videoType === 'archive' ? movie.videoId : null;
  document.getElementById('detail-card').innerHTML = [
    ['Year', movie.year],
    ['Runtime', renderRuntime(movie.runtime)],
    ['Genre', movie.genres.join(', ')],
    ['Director', movie.director],
    ['Cast', movie.cast.join(', ')],
    ['Language', movie.language],
    ['Country', movie.country],
    ['License', `<span style="color:#4ade80">${movie.license}</span>`],
    ['Rating', `<span style="color:var(--gold)">★ ${movie.rating} / 10</span>`],
  ].map(([l,v])=>`<div class="detail-row"><span class="label">${l}</span><span class="value">${v}</span></div>`).join('')
  + (archiveId ? `<a href="https://archive.org/details/${archiveId}" target="_blank" class="source-link">View on Archive.org <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>` : '');

  // Related
  const related = getRelatedMovies(movie, 4);
  const grid = document.getElementById('related-grid');
  related.forEach(m => {
    const a = document.createElement('a');
    a.href = getMovieUrl(m); a.className = 'movie-card';
    a.innerHTML = `
      ${m.poster ? `<img class="movie-poster" src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
      <div class="movie-poster-ph" style="display:${m.poster?'none':'flex'}">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>${m.title}</span>
      </div>
      <div class="movie-info">
        <div class="movie-title-text">${m.title}</div>
        <div class="movie-sub"><span>${m.year}</span><div class="movie-rating">★ ${m.rating}</div></div>
        <div style="margin-top:6px"><span class="badge-free">Free</span></div>
      </div>`;
    grid.appendChild(a);
  });

  function toggleWatchlist(btn) {
    const inList = btn.dataset.inList === 'true';
    btn.dataset.inList = !inList;
    document.getElementById('wl-text').textContent = inList ? 'Add to watchlist' : 'In watchlist';
    const icon = document.getElementById('wl-icon');
    icon.innerHTML = inList ? '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>' : '<polyline points="20 6 9 17 4 12"/>';
    icon.setAttribute('stroke', inList ? 'currentColor' : '#4ade80');
  }
</script>
</body>
</html>
