<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineVault Admin</title>

<link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div class="container">

<h1>🎬 CineVault Admin Panel</h1>

<form id="movieForm">

<input type="text" id="title" placeholder="Movie Title" required>

<input type="text" id="id" placeholder="Movie ID (example: kahika-2)" required>

<input type="number" id="year" placeholder="Year">

<input type="number" id="runtime" placeholder="Runtime (minutes)">

<input type="number" step="0.1" id="rating" placeholder="Rating">

<input type="text" id="director" placeholder="Director">

<input type="text" id="genres" placeholder="Genres (Drama,Travel,Documentary)">

<input type="text" id="language" placeholder="Language">

<input type="text" id="country" placeholder="Country">

<input type="text" id="poster" placeholder="Poster Path (images/poster.jpg)">

<input type="text" id="videoId" placeholder="Archive.org Identifier">

<textarea id="synopsis" placeholder="Movie Description"></textarea>

<label>
<input type="checkbox" id="featured">
Featured Movie
</label>

<label>
<input type="checkbox" id="trending">
Trending Movie
</label>

<button type="submit">
Generate Movie Code
</button>

</form>

<h2>Generated Code</h2>

<textarea id="output"></textarea>

<button id="copyBtn">
Copy Code
</button>

</div>

<script src="js/admin.js"></script>

</body>
</html>
